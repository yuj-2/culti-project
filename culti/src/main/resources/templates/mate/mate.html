<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layout/layout}">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" th:href="@{/css/mate/mate.css}">


  <style>
  
  </style>
</head>

<body>
<div class="mate-page" layout:fragment="content">

  <!-- Header (React 스타일) -->
  <header class="mate-header">
    <div class="inner">
      <h1 class="mate-title">동행 구하기</h1>
      <p class="mate-subtitle">함께 문화생활을 즐겨요~</p>
    </div>
  </header>

  <!-- Filter Tabs -->
  <div class="mate-container mate-tabs-wrap">
    <!-- 기존 탭 구조 유지 + 스타일은 mate.css/위 스타일로 커버 -->
    <div class="filter-section">
	      <div class="tabs">
			  <a class="tab-button"
			     th:href="@{/mate/mate(category='all', page=1, size=${paging.size})}"
			     th:classappend="${category == 'all'} ? ' active' : ''">전체</a>
			
			  <a class="tab-button"
			     th:href="@{/mate/mate(category='movie', page=1, size=${paging.size})}"
			     th:classappend="${category == 'movie'} ? ' active' : ''">영화</a>
			
			  <a class="tab-button"
			     th:href="@{/mate/mate(category='concert', page=1, size=${paging.size})}"
			     th:classappend="${category == 'concert'} ? ' active' : ''">공연</a>
			
			  <a class="tab-button"
			     th:href="@{/mate/mate(category='exhibition', page=1, size=${paging.size})}"
			     th:classappend="${category == 'exhibition'} ? ' active' : ''">전시</a>
			</div>
    </div>
  </div>

  <!-- Posts / Empty -->
  <main class="mate-container">
    <!-- 비어있을 때 -->
    <div class="empty-state" id="emptyState" th:if="${#lists.isEmpty(paging.content)}">
      <div class="empty-icon">
        <i class="fa-regular fa-folder-open" style="color:#94a3b8; font-size:22px;"></i>
      </div>
      <p class="t1">아직 등록된 게시글이 없습니다</p>
      <p class="t2">첫 번째 동행 게시글을 작성해보세요!</p>
    </div>

    <!-- 카드 그리드 -->
    <div class="posts-grid" th:if="${!#lists.isEmpty(paging.content)}">
      <div class="post-card"
           th:each="p : ${paging.content}"
           th:attr="data-id=${p.postId},
                    data-title=${p.title},
                    data-category=${p.category},
                    data-eventAt=${#temporals.format(p.eventAt,'yyyy-MM-dd HH:mm')},
                    data-location=${p.location},
                    data-maxPeople=${p.maxPeople},
                    data-description=${p.description},
                    data-nickname=${p.writer.nickname},
					data-email=${p.writer.email},
                    data-acceptedcount=${acceptedCountMap[p.postId]}
                    ">
        <div class="post-header">
          <h3 class="post-title" th:text="${p.title}">제목</h3>

          <!-- badge label: MOVIE/CONCERT/EXHIBITION -> movie/concert/exhibition -->
          <span class="badge"
                th:text="${p.category}"
                th:classappend="' badge-' + ${#strings.toLowerCase(p.category)}">
          </span>
        </div>

        <div class="post-info">
          <div class="info-row">
            <i class="fa-regular fa-calendar"></i>
            <span th:text="${#temporals.format(p.eventAt, 'yyyy-MM-dd HH:mm')}">날짜</span>
          </div>

          <div class="info-row">
            <i class="fa-solid fa-location-dot"></i>
            <span th:text="${p.location}">장소</span>
          </div>

          <div class="info-row">
            <i class="fa-solid fa-users"></i>
            <span>
			  <span th:text="${acceptedCountMap[p.postId]}">0</span> /
			  <span th:text="${p.maxPeople}">0</span>명
			</span>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!--  Floating Action Button (React FAB 느낌) -->
  <button class="fab" id="createButton" sec:authorize="isAuthenticated()">
    <i class="fa-solid fa-plus"></i>
  </button>

  <!-- Create Modal (기존 유지) -->
  <div class="modal-overlay" id="createModal">
    <div class="modal">
      <div class="modal-header">
        <h2 class="modal-title">동행 구하기</h2>
        <button class="close-button" onclick="closeCreateModal()">&times;</button>
      </div>

      <form id="createForm" method="post" th:action="@{/mate/addPost}">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <div class="form-group">
          <label class="form-label" for="title">작품명</label>
          <input type="text" class="form-input" id="title" name="title" placeholder="예) 듄: 파트2" required>
        </div>

        <div class="form-group">
          <label class="form-label" for="category">카테고리</label>
          <select class="form-select" id="category" name="category" required>
            <option value="MOVIE">영화</option>
            <option value="CONCERT">공연</option>
            <option value="EXHIBITION">전시</option>
          </select>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="date">날짜</label>
           <input type="date"
		       class="form-input"
		       id="date"
		       name="date"
		       th:attr="min=${#temporals.format(#temporals.createNow(),'yyyy-MM-dd')}"
		       required>
          </div>
          <div class="form-group">
            <label class="form-label" for="time">시간</label>
            <input type="time" class="form-input" id="time" name="time" required>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="location">장소</label>
          <input type="text" class="form-input" id="location" name="location" placeholder="예) CGV 강남" required>
        </div>

        <div class="form-group">
          <label class="form-label" for="maxPeople">모집 인원</label>
          <select class="form-select" id="maxPeople" name="maxPeople" required>
            <option value="2">2명</option>
            <option value="3">3명</option>
            <option value="4">4명</option>
            <option value="5">5명</option>
            <option value="6">6명</option>
          </select>
        </div>

        <div class="form-group">
          <label class="form-label" for="description">상세 설명</label>
          <textarea class="form-textarea" id="description" name="description"
                    placeholder="함께 보고 싶은 이유, 선호하는 분위기 등을 자유롭게 작성해주세요" required></textarea>
        </div>

        <div class="button-group">
          <button type="button" class="button button-secondary" onclick="closeCreateModal()">취소</button>
          <button type="submit" class="button button-primary">등록하기</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Detail Modal -->
  <div class="modal-overlay" id="detailModal">
    <div class="modal">
      <div class="modal-header">
        <h2 class="modal-title" id="detailTitle"></h2>
        <button class="close-button" onclick="closeDetailModal()">&times;</button>
      </div>
      <div id="detailContent"></div>
    </div>
  </div>

  <!-- Apply Modal -->
  <div class="modal-overlay" id="applyModal">
    <div class="modal apply-modal">
      <div class="modal-header">
        <h2 class="modal-title">참여 신청</h2>
        <button class="close-button" onclick="closeApplyModal()">&times;</button>
      </div>

      <div class="form-group">
        <label class="form-label">작성자에게 전달할 메시지</label>
        <textarea class="form-textarea apply-textarea" id="applyMessage"
                  placeholder="자기소개나 함께 보고 싶은 이유를 적어주세요 😊"></textarea>
      </div>

      <div class="apply-actions">
        <button class="button button-secondary" onclick="closeApplyModal()">취소</button>
        <button class="button button-primary" onclick="submitApply()">신청하기</button>
      </div>
    </div>
  </div>
  
  <form id="applyForm" method="post" action="/mate/applyPost" style="display:none;">
	  <input type="hidden" name="postId" id="applyPostId">
	  <input type="hidden" name="message" id="applyMessageField">
	  <input type="hidden" name="" id="applyCsrfField">
	</form>
  
  <!-- Delete Confirm Modal -->
<div class="modal-overlay" id="deleteConfirmModal">
  <div class="modal">
    <div class="modal-header">
      <h2 class="modal-title">게시글 삭제</h2>
      <button class="close-button" onclick="closeDeleteConfirmModal()">&times;</button>
    </div>

    <div style="padding: 6px 0 18px;">
      <p style="margin:0; color:#334155;">정말 삭제할까요? 삭제하면 복구할 수 없어요.</p>
    </div>

    <div class="button-group">
      <button type="button" class="button button-secondary" onclick="closeDeleteConfirmModal()">취소</button>

      <!-- 실제 삭제 submit용 form -->
      <form id="deleteForm" method="post" action="/mate/deletePost" style="margin:0;">
        <input type="hidden" name="postId" id="deletePostId">
        <input type="hidden" name="" id="deleteCsrfField">
        <button type="submit" class="button button-danger">삭제</button>
      </form>
    </div>
  </div>
</div>
  

  <!-- Pagination -->
<div class="pagination-wrap">
  <nav class="pagination" th:if="${paging.totalPages > 1}">

    <!-- 이전 -->
    <a class="page-btn"
       th:if="${paging.hasPrevious()}"
       th:href="@{/mate/mate(category=${category}, page=${paging.number}, size=${paging.size})}">
      ‹
    </a>

    <!-- 페이지 번호 -->
    <a class="page-num"
       th:each="i : ${#numbers.sequence(1, paging.totalPages)}"
       th:href="@{/mate/mate(category=${category}, page=${i}, size=${paging.size})}"
       th:text="${i}"
       th:classappend="${i == paging.number + 1} ? ' active' : ''">
    </a>

    <!-- 다음 -->
    <a class="page-btn"
       th:if="${paging.hasNext()}"
       th:href="@{/mate/mate(category=${category}, page=${paging.number + 2}, size=${paging.size})}">
      ›
    </a>

  </nav>
</div>

  <!-- JS: 로그인 여부는 서버에서 내려주기 -->
  <script th:inline="javascript">
    const isAuthenticated = /*[[${#authorization.expression('isAuthenticated()')}]]*/ false;
  </script>
	
<script th:inline="javascript">
  const loginUserEmail = /*[[${user != null ? user.email : ''}]]*/ '';
</script>

<script th:inline="javascript">
  const csrfParam = /*[[${_csrf.parameterName}]]*/ '_csrf';
  const csrfToken = /*[[${_csrf.token}]]*/ '';
</script>

<script th:inline="javascript">
  // 내가 이미 신청한 게시글들의 postId 목록 (예: [1,3,7])
  const appliedPostIds = /*[[${appliedPostIds}]]*/ [];
</script>
<script th:inline="javascript">
const appliedStatusMap = JSON.parse(/*[[${appliedStatusMapJson}]]*/ "{}");
</script>

  <script>
  let selectedPostId = null;

  function bindPostCardClicks() {
    document.querySelectorAll('.post-card').forEach(card => {
      card.addEventListener('click', () => {
        selectedPostId = Number(card.dataset.id);

        const title = card.dataset.title || '';
        const category = card.dataset.category || '';
        const eventAt = card.dataset.eventat || '';
        const location = card.dataset.location || '';
        const maxPeople = card.dataset.maxpeople || '';
        const nickname = card.dataset.nickname || '';
        const desc = card.dataset.description || '';
        const acceptedCount = card.dataset.acceptedcount || '0';
        const writerEmail = card.dataset.email || '';

        document.getElementById('detailTitle').innerHTML =
          `${title} <span class="badge badge-${category.toLowerCase()}" style="margin-left:12px;">${category}</span>`;

        const status = appliedStatusMap[selectedPostId];

        // 참여 버튼
        let applyButtonHtml = '';
        if (loginUserEmail && loginUserEmail === writerEmail) {
          applyButtonHtml = `
            <div class="owner-hint">
              <i class="fa-solid fa-circle-info"></i>
              <span>내가 작성한 게시글입니다</span>
            </div>
          `;
        } else if (status) {
          if (status === "PENDING") {
            applyButtonHtml = `
              <div class="status status-pending">
                <i class="fa-solid fa-hourglass-half"></i>
                <span>수락 대기중</span>
              </div>
            `;
          } else if (status === "ACCEPTED") {
            applyButtonHtml = `
              <div class="status status-accepted">
                <i class="fa-solid fa-circle-check"></i>
                <span>참여 확정됨</span>
              </div>
            `;
          } else if (status === "REJECTED") {
            applyButtonHtml = `
              <div class="status status-rejected">
                <i class="fa-solid fa-circle-xmark"></i>
                <span>거절됨</span>
              </div>
            `;
          } else if (status === "CANCELED") {
            applyButtonHtml = `
              <div class="status status-canceled">
                <i class="fa-solid fa-ban"></i>
                <span>신청 취소됨</span>
              </div>
            `;
          }
        } else {
          applyButtonHtml = isAuthenticated
            ? `<button class="button button-primary" onclick="openApplyModal()">참여 신청</button>`
            : `<button class="button button-primary" onclick="location.href='/auth/login'">로그인 후 신청</button>`;
        }

        // 삭제 버튼
        let deleteButtonHtml = '';
        if (loginUserEmail && loginUserEmail === writerEmail) {
          deleteButtonHtml = `
            <button type="button" class="button button-danger"
                    onclick="openDeleteConfirmModal(${selectedPostId})">
              삭제
            </button>
          `;
        }

        const hasApply = applyButtonHtml && applyButtonHtml.trim().length > 0;
        const hasDelete = deleteButtonHtml && deleteButtonHtml.trim().length > 0;
        const actionClass = (!hasApply || !hasDelete) ? 'detail-actions only-one' : 'detail-actions';

        document.getElementById('detailContent').innerHTML = `
          <div class="detail-grid">
            <div class="detail-item"><i class="fa-solid fa-user"></i>
              <div class="detail-content"><div class="detail-value">${nickname}</div></div>
            </div>
            <div class="detail-item"><i class="fa-regular fa-calendar detail-fa"></i>
              <div class="detail-content"><div class="detail-label">날짜 및 시간</div><div class="detail-value">${eventAt}</div></div>
            </div>
            <div class="detail-item"><i class="fa-solid fa-location-dot detail-fa"></i>
              <div class="detail-content"><div class="detail-label">장소</div><div class="detail-value">${location}</div></div>
            </div>
            <div class="detail-item"><i class="fa-solid fa-users detail-fa"></i>
              <div class="detail-content"><div class="detail-label">모집 인원</div><div class="detail-value">${acceptedCount}/${maxPeople}명</div></div>
            </div>
          </div>

          <div class="detail-description">
            <div class="detail-label">상세 설명</div>
            <p class="description-text">${desc}</p>
          </div>

          <div class="button-group">
            ${applyButtonHtml}
          </div>
          <div class="${actionClass}">
            ${deleteButtonHtml}
          </div>
        `;

        document.getElementById('detailModal').classList.add('show');
      });
    });
  }

  function openPostModalFromQuery() {
    const params = new URLSearchParams(window.location.search);
    const openPostId = params.get('openPostId');
    if (!openPostId) return;

    const card = document.querySelector(`.post-card[data-id="${openPostId}"]`);
    if (card) {
      card.scrollIntoView({ behavior: 'smooth', block: 'center' });
      card.click();
    } else {
      console.warn('해당 게시글이 현재 목록에 없습니다. postId=', openPostId);
    }
  }

  // DOM 로드 후: 바인딩 먼저 -> 쿼리 오픈
  window.addEventListener('DOMContentLoaded', () => {
    bindPostCardClicks();
    openPostModalFromQuery();
  });

  // ===== 아래 기존 함수들은 그대로 둬도 됨 =====
  function closeDetailModal() {
    document.getElementById('detailModal').classList.remove('show');
  }

  function openApplyModal() {
    document.getElementById('applyMessage').value = '';
    document.getElementById('applyModal').classList.add('show');
  }

  function closeApplyModal() {
    document.getElementById('applyModal').classList.remove('show');
  }

  function submitApply() {
    const message = document.getElementById('applyMessage').value.trim();
    if (!selectedPostId) return alert("게시글을 먼저 선택해주세요.");
    if (!message) return alert("메시지를 입력해주세요.");

    document.getElementById('applyPostId').value = selectedPostId;
    document.getElementById('applyMessageField').value = message;

    const csrfInput = document.getElementById('applyCsrfField');
    csrfInput.setAttribute('name', csrfParam);
    csrfInput.value = csrfToken;

    document.getElementById('applyForm').submit();
  }

  function openDeleteConfirmModal(postId) {
    document.getElementById('deletePostId').value = postId;

    const csrfInput = document.getElementById('deleteCsrfField');
    csrfInput.setAttribute('name', csrfParam);
    csrfInput.value = csrfToken;

    document.getElementById('deleteConfirmModal').classList.add('show');
  }

  function closeDeleteConfirmModal() {
    document.getElementById('deleteConfirmModal').classList.remove('show');
  }
  
//글쓰기 모달 열기/닫기
  function openCreateModal() {
    const modal = document.getElementById('createModal');
    if (!modal) return;
    modal.classList.add('show');
  }

  function closeCreateModal() {
    const modal = document.getElementById('createModal');
    if (!modal) return;
    modal.classList.remove('show');
  }

  window.addEventListener('DOMContentLoaded', () => {
    // 기존 코드 유지
    bindPostCardClicks();
    openPostModalFromQuery();

    // 플러스 버튼 클릭 시 모달 오픈
    const btn = document.getElementById('createButton');
    if (btn) {
      btn.addEventListener('click', (e) => {
        e.preventDefault();
        e.stopPropagation();
        openCreateModal();
      });
    }

    // 오버레이(바깥) 클릭하면 닫기 (원하면 사용)
    const overlay = document.getElementById('createModal');
    if (overlay) {
      overlay.addEventListener('click', (e) => {
        if (e.target === overlay) closeCreateModal();
      });
    }

    // ESC로 닫기 (원하면 사용)
    window.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeCreateModal();
    });
  });
</script>
</div>
</body>
</html>
