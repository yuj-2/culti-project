<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>공연 예매 | CULTI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        .seat { 
            width: 28px; height: 28px; margin: 2px; font-size: 10px; 
            display: flex; align-items: center; justify-content: center; 
            border-radius: 4px; cursor: pointer; transition: all 0.2s; 
            border: 1px solid #444; background: transparent; color: white; 
        }
        /* 등급별 색상 설정 */
        .seat.vip { border-color: #ffd700; color: #ffd700; background: rgba(255, 215, 0, 0.1); }
        .seat.r-seat { border-color: #4caf50; color: #4caf50; background: rgba(76, 175, 80, 0.1); }
        .seat.s-seat { border-color: #2196f3; color: #2196f3; background: rgba(33, 150, 243, 0.1); }
        /* A석: VIP(금색)와 겹치지 않게 핑크색으로 변경 */
        .seat.a-seat { border-color: #ff4081; color: #ff4081; background: rgba(255, 64, 129, 0.1); }
        
        .seat.selected { background: #503396 !important; color: white !important; border-color: #7c4dff !important; }
        .seat.reserved { background: #333; color: #555; border: none; cursor: not-allowed; }
        
        .stage { 
            background: linear-gradient(to bottom, #444, #111); 
            height: 45px; width: 50%; margin: 0 auto 60px; 
            border-radius: 0 0 100px 100px; display: flex; 
            align-items: center; justify-content: center; 
            color: #777; font-weight: bold; letter-spacing: 15px; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .seat-layout-wrapper { display: flex; justify-content: center; align-items: flex-start; gap: 30px; }
        .seat-block { display: flex; flex-direction: column; gap: 4px; }
        .left-block { transform: rotate(8deg); margin-top: 20px; }
        .right-block { transform: rotate(-8deg); margin-top: 20px; }
        .row-wrapper { display: flex; align-items: center; justify-content: center; gap: 2px; }
        .row-label { width: 24px; text-align: center; font-size: 11px; color: #666; font-weight: bold; }

        .counter-box { display: flex; border: 1px solid #444; background: #0f0f0f; border-radius: 8px; overflow: hidden; }
        .counter-btn { width: 30px; height: 30px; color: white; font-weight: bold; }
        .count-val { width: 40px; text-align: center; line-height: 30px; font-weight: bold; border-left: 1px solid #444; border-right: 1px solid #444; }

        .floor-btn.active { background-color: #503396; color: white; border-color: #503396; }
    </style>
</head>
<body class="bg-[#0f0f0f] text-white font-sans">
    
    <div th:replace="~{layout/header :: headerFragment}"></div>

    <main class="max-w-[1600px] mx-auto py-10 px-6 pb-40">
        <div class="bg-[#1a1a1a] p-6 rounded-2xl mb-8 flex justify-between items-center border border-gray-800">
            <div class="flex items-center gap-6">
                <h2 class="text-xl font-bold text-gray-200">관람 인원 선택</h2>
                <div class="counter-box">
                    <button onclick="updateCount('adult', -1)" class="counter-btn hover:bg-gray-800">-</button>
                    <span id="adult-count" class="count-val">0</span>
                    <button onclick="updateCount('adult', 1)" class="counter-btn hover:bg-gray-800">+</button>
                </div>
                <button onclick="location.reload()" class="text-[10px] text-gray-500 hover:text-white flex items-center gap-1">
                    <i data-lucide="rotate-ccw" class="w-3 h-3"></i> 초기화
                </button>
            </div>
            <div class="flex gap-4 text-xs text-gray-400">
                <span>VIP: <b class="text-[#ffd700]">150,000</b></span>
                <span>R: <b class="text-[#4caf50]">120,000</b></span>
                <span>S: <b class="text-[#2196f3]">90,000</b></span>
                <span>A: <b class="text-[#ff4081]">60,000</b></span>
            </div>
        </div>

        <div class="flex justify-center gap-4 mb-8">
            <button onclick="switchFloor(1)" id="btn-1f" class="floor-btn active px-12 py-3 rounded-full border border-gray-600 text-sm font-bold transition-all">1층 (1F)</button>
            <button onclick="switchFloor(2)" id="btn-2f" class="floor-btn px-12 py-3 rounded-full border border-gray-600 text-gray-500 text-sm font-bold transition-all">2층 (2F)</button>
        </div>

        <div class="bg-[#1a1a1a] p-16 rounded-3xl border border-gray-800 text-center min-h-[650px] shadow-inner">
            <div class="stage">STAGE</div>
            <div id="seat-map-grid" class="flex flex-col items-center">
                <div class="w-full">
                    <div id="current-floor-label" class="text-left ml-10 mb-8 text-[#9D7BFF] font-black italic text-xl">1F (1층)</div>
                    <div class="seat-layout-wrapper">
                        <div id="block-left" class="seat-block left-block"></div>
                        <div id="block-center" class="seat-block center-block"></div>
                        <div id="block-right" class="seat-block right-block"></div>
                    </div>
                </div>
            </div>

            <div class="mt-20 flex justify-center gap-8 text-[11px] text-gray-500 border-t border-gray-800 pt-10">
                <div class="flex items-center gap-2"><div class="seat vip !w-3.5 !h-3.5"></div>VIP석</div>
                <div class="flex items-center gap-2"><div class="seat r-seat !w-3.5 !h-3.5"></div>R석</div>
                <div class="flex items-center gap-2"><div class="seat s-seat !w-3.5 !h-3.5"></div>S석</div>
                <div class="flex items-center gap-2"><div class="seat a-seat !w-3.5 !h-3.5"></div>A석</div>
                <div class="flex items-center gap-2"><div class="seat selected !w-3.5 !h-3.5"></div>선택</div>
            </div>
        </div>
    </main>

    <div class="fixed bottom-0 left-0 right-0 bg-[#0f0f0f] border-t border-gray-800 p-6 z-50">
        <div class="max-w-[1600px] mx-auto flex justify-between items-center">
            <div class="flex gap-10">
                <div>
                    <p class="text-[10px] text-gray-500 font-bold uppercase">Selected Seats</p>
                    <p id="display-seat-names" class="text-sm font-black text-[#9D7BFF]">선택 안 됨</p>
                </div>
                <div>
                    <p class="text-[10px] text-gray-500 font-bold uppercase">Total Payment</p>
                    <p id="display-total-price" class="text-2xl font-black text-white">₩0</p>
                </div>
            </div>
            <button id="submit-booking-btn" disabled class="px-20 py-4 rounded-xl bg-gray-800 text-white font-black cursor-not-allowed">결제하기</button>
        </div>
    </div>

    <script th:src="@{/js/booking_performance.js}"></script>
</body>
</html>
