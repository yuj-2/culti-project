<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>빠른예매 | CULTI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
<style>
/* 1. 결제 모달 (배경 레이어) */
#paymentModal {
    position: fixed !important;
    inset: 0;
    width: 100vw;
    height: 100vh;
    background: rgba(0, 0, 0, 0.75); /* 배경을 더 어둡게 하여 결제창 집중도 향상 */
    z-index: 9000; /* 포트원(10000 이상)보다 낮게 설정 */
    display: none; /* JS에서 flex로 전환하여 중앙 정렬 */
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(4px); /* 배경 블러 처리로 세련된 느낌 추가 */
}

/* 2. iamport iframe (QR 깨짐 방지 핵심 수정) */
/* [중요] 고정 크기를 제거하고 포트원 자체의 반응형 스타일을 허용해야 합니다. */
iframe[name^="iamport"] {
    position: fixed !important;
    top: 50% !important;
    left: 50% !important;
    transform: translate(-50%, -50%) !important; /* 화면 정중앙 배치 */
    width: 450px !important; /* 카카오페이 권장 최소 폭 */
    height: 650px !important;
    max-width: 95vw !important; /* 모바일 대응 */
    max-height: 95vh !important;
    z-index: 10001 !important;
    border-radius: 20px !important; /* 둥근 모서리 적용 */
    box-shadow: 0 20px 60px rgba(0,0,0,0.5) !important;
    background: white !important;
    border: none !important;
}

/* 3. 기존 modal-content 영향 제거 및 정돈 */
.modal-content {
    background: white;
    padding: 40px;
    border-radius: 20px;
    width: 400px;
    text-align: center;
    position: relative;
    z-index: 9001; /* 배경보다는 높고 결제창보다는 낮게 */
}

/* 4. 좌석 스타일 (유지 및 최적화) */
.seat {
    width: 34px;
    height: 34px;
    margin: 4px;
    font-size: 11px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    border: 1px solid #444;
}

.seat.available {
    background: #2a2a2a;
    color: #ccc;
    border-color: #555;
}

.seat.available:hover {
    background: #444;
    border-color: #777;
    transform: translateY(-2px);
}

.seat.selected {
    background: #503396 !important;
    color: white !important;
    border-color: #7a58ca !important;
    box-shadow: 0 0 15px rgba(80, 51, 150, 0.5);
}

.seat.reserved {
    background: #1a1a1a;
    color: #444;
    cursor: not-allowed;
    border: none;
}
</style>
</head>
<body class="bg-[#0f0f0f] text-white font-sans">
    <div th:replace="~{layout/header :: headerFragment}"></div>

    <main class="max-w-[1440px] mx-auto py-10 flex gap-8 px-6">
        <div class="flex-1 bg-[#1a1a1a] border border-gray-800 rounded-3xl p-10 shadow-2xl">
            <div class="flex flex-col items-center mb-12">
                <div class="flex items-center justify-between w-full mb-8">
                    <div class="flex items-center gap-4">
                        <h2 class="text-2xl font-black tracking-tighter italic text-gray-200">관람인원선택</h2>
                        <button type="button" class="text-[10px] font-bold border border-[#503396] px-2.5 py-1 rounded-md bg-transparent text-[#9D7BFF] hover:bg-[#503396] hover:text-white transition-all duration-200 flex items-center gap-1.5 whitespace-nowrap" 
                                onclick="location.reload()">
                            <i data-lucide="rotate-ccw" class="w-3 h-3"></i> 초기화
                        </button>
                    </div>
                </div>
                
       <div class="flex items-center justify-around bg-[#252525] px-10 py-6 rounded-2xl border border-gray-700 shadow-inner w-full">

    <!-- 성인 -->
    <div class="flex items-center gap-4">
        <span class="text-[11px] font-bold text-gray-500 uppercase">성인</span>
        <div class="counter-box scale-110">
            <button type="button" class="counter-btn" data-type="adult" onclick="handleUpdateCount(this, -1)">-</button>
            <span id="adult-count" class="count-val">0</span>
            <button type="button" class="counter-btn" data-type="adult" onclick="handleUpdateCount(this, 1)">+</button>
        </div>
        <div class="h-6 w-[1px] bg-gray-700 ml-4"></div>
    </div>

    <!-- 청소년 -->
    <div class="flex items-center gap-4">
        <span class="text-[11px] font-bold text-gray-500 uppercase">청소년</span>
        <div class="counter-box scale-110">
            <button type="button" class="counter-btn" data-type="youth" onclick="handleUpdateCount(this, -1)">-</button>
            <span id="youth-count" class="count-val">0</span>
            <button type="button" class="counter-btn" data-type="youth" onclick="handleUpdateCount(this, 1)">+</button>
        </div>
        <div class="h-6 w-[1px] bg-gray-700 ml-4"></div>
    </div>

    <!-- 경로 -->
    <div class="flex items-center gap-4">
        <span class="text-[11px] font-bold text-gray-500 uppercase">경로</span>
        <div class="counter-box scale-110">
            <button type="button" class="counter-btn" data-type="senior" onclick="handleUpdateCount(this, -1)">-</button>
            <span id="senior-count" class="count-val" style="color:#FFD700">0</span>
            <button type="button" class="counter-btn" data-type="senior" onclick="handleUpdateCount(this, 1)">+</button>
        </div>
        <div class="h-6 w-[1px] bg-gray-700 ml-4"></div>
    </div>

    <!-- 우대 -->
    <div class="flex items-center gap-4">
        <span class="text-[11px] font-bold text-gray-500 uppercase">우대</span>
        <div class="counter-box scale-110">
            <button type="button" class="counter-btn" data-type="special" onclick="handleUpdateCount(this, -1)">-</button>
            <span id="special-count" class="count-val" style="color:#FFD700">0</span>
            <button type="button" class="counter-btn" data-type="special" onclick="handleUpdateCount(this, 1)">+</button>
        </div>
    </div>

</div>
            </div>

            <div class="relative border-t border-gray-800 pt-16 text-center">
                <div class="inline-block">
                    <div class="screen"></div>
                    <div class="mb-10 text-[10px] tracking-[10px] text-gray-600 uppercase">Screen</div>
                    <div id="seat-map-grid" class="flex flex-col gap-1 items-center"></div>
                </div>
            </div>
            
            <div class="mt-16 flex justify-center gap-10 text-[11px] text-gray-500 border-t border-gray-800 pt-8">
                <div class="flex items-center gap-2"><div class="seat available !w-4 !h-4"></div>일반석</div>
                <div class="flex items-center gap-2"><div class="seat selected !w-4 !h-4"></div>선택됨</div>
                <div class="flex items-center gap-2"><div class="seat reserved !w-4 !h-4">X</div>예매완료</div>
            </div>
        </div>

        <aside class="w-[380px]">
            <div class="bg-[#1a1a1a] text-white p-8 rounded-3xl border border-gray-800 sticky top-10 shadow-2xl">
                <div class="flex gap-5 mb-8 border-b border-gray-800 pb-8">
    <img th:src="${schedule.content.posterUrl != null ? schedule.content.posterUrl : '/img/no-poster.jpg'}" 
         class="w-20 h-28 object-cover rounded-xl shadow-lg border border-gray-700"
         onerror="this.onerror=null; this.src='/img/no-poster.jpg';">
    <div>
        <h3 id="md-title" class="font-black text-xl leading-tight tracking-tighter" th:text="${schedule.content.title}">영화제목</h3>
        <p class="text-sm text-gray-400 mt-3" th:text="${schedule.place.name}">상영관 정보</p>
        <p class="text-sm text-gray-400" th:text="${#temporals.format(schedule.showTime, 'MM.dd(E) HH:mm')}">날짜/시간</p>
    </div>
</div>
                <div class="space-y-6 text-sm mb-12">
                    <div class="flex justify-between items-center">
                        <span class="text-gray-500 font-bold uppercase tracking-widest">선택좌석</span>
                        <span id="display-seat-names" class="font-black text-[#9D7BFF]">선택 안 됨</span>
                    </div>
                    <div class="pt-6 border-t border-gray-800 flex justify-between items-end">
                        <span class="text-gray-500 font-bold uppercase tracking-widest mb-1">총 결제 금액</span>
                        <span class="text-3xl font-black text-white" id="display-total-price">₩0</span>
                    </div>
                </div>

                <div class="flex gap-2">
                    <button type="button" class="flex-1 py-4 bg-[#252525] rounded-2xl font-bold hover:bg-[#333] transition-colors border border-gray-700" onclick="history.back()">이전</button>
                    <button id="submit-booking-btn"
        onclick="executePortOne('KAKAO')"
        class="flex-[2] py-4 bg-[#503396] text-white rounded-2xl font-black transition-all shadow-lg active:scale-95 hover:bg-[#3f287a]">
    결제하기
</button>
                </div>
            </div>
        </aside>
    </main>

    <div id="bookingData" style="display: none;">
        <input type="hidden" name="scheduleId" id="scheduleId" th:value="${schedule.scheduleId}">
        <input type="hidden" name="userEmail" id="userEmail" th:value="${#authentication.name}">
        <input type="hidden" id="input-total-price" value="0">
        <input type="hidden" id="input-seat-ids" value="">
    </div>

<script src="https://cdn.iamport.kr/js/iamport.payment-1.2.0.js"></script>
<script th:src="@{/js/payment.js}"></script>
<script th:src="@{/js/booking_seat.js}"></script>

    <script th:inline="javascript">
        /*<![CDATA[*/
        // 서버 데이터를 전역 변수로 노출
        window.seatListFromDb = /*[[${seats}]]*/ [];
        
        /*]]>*/
        
        lucide.createIcons();

        /**
         * 인원 변경 핸들러
         */
        function handleUpdateCount(element, delta) {
            const type = element.getAttribute('data-type');
            // booking_seat.js가 로드되었는지 확인 후 호출
            if (typeof window.updateCount === 'function') {
                window.updateCount(type, delta);
            } else {
                console.warn("로딩 중입니다. 잠시만 기다려주세요.");
            }
        }
    </script>
	
</body>
</html>
