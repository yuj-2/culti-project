<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/layout}">
<head>
    <title>예매 완료 - CULTI</title>
    <style>
        .result-page-wrapper {
            display: flex;
            flex-direction: column;
            min-height: 85vh;
            background-color: #f4f6f9;
            align-items: center;
            justify-content: center;
            padding: 80px 0;
        }

        /* 티켓 본체 */
        .ticket-container {
            display: flex; 
            width: 1100px; 
            height: 480px;
            filter: drop-shadow(0 20px 40px rgba(0,0,0,0.12));
            border-radius: 25px;
            background: white;
            margin-bottom: 50px;
        }

        /* 왼쪽 메인 영역 (보라색) */
        .ticket-main {
            flex: 7.5;
            background: #503396;
            color: white;
            padding: 50px 60px;
            position: relative;
            display: flex;
            flex-direction: column;
            border-radius: 25px 0 0 25px;
            border-right: 2px dashed rgba(255,255,255,0.3);
        }

        /* 오른쪽 바코드 영역 */
        .ticket-stub {
            flex: 2.5;
            background: #ffffff;
            color: #333333;
            border-radius: 0 25px 25px 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 30px;
        }

        /* 티켓 홈 디자인 */
        .ticket-main::before, .ticket-main::after {
            content: '';
            position: absolute;
            right: -15px;
            width: 30px;
            height: 30px;
            background: #f4f6f9;
            border-radius: 50%;
            z-index: 5;
        }
        .ticket-main::before { top: -15px; }
        .ticket-main::after { bottom: -15px; }

        .brand-logo { font-weight: 900; font-size: 1.6rem; margin-bottom: 35px; opacity: 0.9; }
        .movie-title { font-size: 2.8rem; font-weight: 800; margin-bottom: 30px; letter-spacing: -1px; }
        
        .info-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 30px;
        }
        .info-item .label { color: rgba(255,255,255,0.6); font-size: 1rem; display: block; margin-bottom: 8px; }
        .info-item .value { font-weight: 700; font-size: 1.3rem; }

        .seat-badge {
            background: rgba(255,255,255,0.2);
            color: white;
            padding: 5px 12px;
            border-radius: 8px;
            margin-right: 8px;
            font-size: 1.1rem;
            font-weight: 700;
        }

        /* 버튼 배치 영역 */
        .outer-button-area {
            width: 1100px; 
            display: flex;
            justify-content: flex-end; 
            gap: 15px;
            margin-bottom: 30px;
        }

        .btn-detail {
            padding: 12px 25px;
            border-radius: 30px;
            font-weight: 500;
            text-decoration: none;
            font-size: 0.95rem;
            transition: 0.3s ease;
            background: transparent;
            color: #666;
            border: 1px solid #ccc;
        }
        
        .btn-go-home {
            padding: 12px 30px;
            border-radius: 30px;
            font-weight: 700;
            text-decoration: none;
            font-size: 0.95rem;
            background: #ffffff;
            color: #503396;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .btn-detail:hover {
            background: #eee;
            border-color: #999;
        }

        /* 바코드 스타일 */
        .stub-title { font-size: 1.2rem; font-weight: 800; margin-bottom: 30px; color: #503396; letter-spacing: 2px; }
        .barcode-img { width: 140px; height: auto; }
        .stub-num { font-size: 0.8rem; color: #999; margin-top: 15px; font-family: 'Courier New', monospace; }
    </style>
</head>
<body>
    <div layout:fragment="content" class="result-page-wrapper">
        <div class="ticket-container">
            <div class="ticket-main">
                <div class="brand-logo">CULTI CINEMA</div>
                <div class="movie-title" th:text="${booking.movieTitle}">영화 제목</div>
                
                <div class="info-grid">
                    <div class="info-item">
                        <span class="label">DATE / TIME</span>
                        <span class="value" th:text="${booking.showTime}">2026.02.27 18:00</span>
                    </div>
                    <div class="info-item">
                        <span class="label">BOOKING NO.</span>
                        <span class="value" th:text="${booking.bookingNumber}">CULTI_00000000</span>
                    </div>
                    <div class="info-item">
                        <span class="label">SEATS</span>
                        <div class="value">
                            <span th:each="name : ${booking.seatNames}" th:text="${name}" class="seat-badge">좌석</span>
                        </div>
                    </div>
                    <div class="info-item">
                        <span class="label">TOTAL PRICE</span>
                        <span class="value" style="font-size: 2.2rem; font-weight: 800;" 
                              th:text="${#numbers.formatInteger(booking.totalPrice, 3, 'COMMA')} + '원'">0원</span>
                    </div>
                </div>
            </div>

            <div class="ticket-stub">
                <div class="stub-title">TICKET STUB</div>
                <img th:src="'https://bwipjs-api.metafloor.com/?bcid=code128&text=' + ${booking.bookingNumber} + '&scale=3&rotate=N&includetext=false'" 
                     class="barcode-img" alt="Barcode">
                <div th:text="${booking.bookingNumber}" class="stub-num">CULTI_00000000</div>
                <div style="margin-top: 25px; font-weight: 800; color: #503396; opacity: 0.5;">CULTI ONLY</div>
            </div>
        </div>

        <div class="outer-button-area">
            <a href="/" class="btn-go-home">홈으로</a>
            <a href="/member/mypage/booking" class="btn-detail">상세 예매 내역 확인하기</a>
        </div>
    </div>

    <script th:inline="javascript">
        /*<![CDATA[*/
        console.log("예매 결과 데이터 로드 완료:", /*[[${booking.bookingNumber}]]*/ '');
        /*]]>*/
    </script>
</body>
</html>
