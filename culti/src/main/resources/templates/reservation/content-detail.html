<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title th:text="${content.title} + ' - 상세페이지'">상세페이지</title>
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script th:src="@{/js/reservation.js}"></script>
<script src="https://cdn.tailwindcss.com?plugins=line-clamp"></script>
</head>
<body class="min-h-screen bg-gray-50 font-sans">

    <div th:replace="~{layout/header :: headerFragment}"></div>

    <div class="bg-white border-b border-gray-200 sticky top-0 z-10 shadow-sm">
        <div class="max-w-4xl mx-auto px-4 sm:px-6 py-4">
            <div class="flex items-center gap-4">
                <button onclick="history.back()" class="p-2 hover:bg-gray-100 rounded-lg transition-colors">
                    <i data-lucide="arrow-left" class="w-6 h-6 text-[#252451]"></i>
                </button>
                <h1 class="text-xl font-bold text-[#252451]">
                    <span th:text="${content.title} + ' 상세페이지'"></span>
                </h1>
            </div>
        </div>
    </div>
    
    <section class="bg-white">
        <div class="max-w-7xl mx-auto px-6 py-12 md:py-16">
            <div class="grid md:grid-cols-2 gap-8 lg:gap-12">
                
                <div class="flex justify-center md:justify-start">
                    <div class="w-full max-w-md">
                        <img th:src="${content.posterUrl}" 
                             th:alt="${content.title}" 
                             class="w-full rounded-2xl shadow-xl border border-gray-100">
                    </div>
                </div>

                <div class="flex flex-col justify-center space-y-6">
                    <div class="flex flex-wrap gap-3">
                        <span class="px-4 py-2 bg-[#503396] text-white rounded-full text-sm font-medium" 
                              th:text="${content.category}">카테고리</span>
                        <span class="px-4 py-2 bg-gray-100 text-gray-700 rounded-full text-sm font-medium"
                              th:text="${content.ageLimit}">연령제한</span>
                    </div>

                    <h1 class="text-3xl md:text-4xl lg:text-5xl font-bold text-gray-900 leading-tight"
                        th:text="${content.title}">제목</h1>

                    <div class="space-y-4 text-gray-700">
                        <div class="flex items-start gap-3">
                            <i data-lucide="calendar" class="w-5 h-5 text-[#503396] mt-0.5 flex-shrink-0"></i>
                            <div>
                                <p class="font-medium text-gray-900">공연 기간</p>
                                <p class="text-gray-600 mt-1" 
                                   th:text="${#temporals.format(content.startDate, 'yyyy.MM.dd')} + ' ~ ' + ${#temporals.format(content.endDate, 'yyyy.MM.dd')}">
                                </p>
                            </div>
                        </div>
                        
                        <div class="flex items-start gap-3">
                            <i data-lucide="clock" class="w-5 h-5 text-[#503396] mt-0.5 flex-shrink-0"></i>
                            <div>
                                <p class="font-medium text-gray-900">상영 일정</p>
                                
                                <p class="text-red-500 mt-1 text-sm font-medium" th:if="${content.schedules == null or #lists.isEmpty(content.schedules)}">
                                    현재 등록된 상영 일정이 없습니다.
                                </p>

                                <div class="text-gray-600 mt-1 space-y-2" th:unless="${#lists.isEmpty(content.schedules)}">
                                    <p th:each="schedule : ${content.schedules}" class="bg-gray-50 px-3 py-2 rounded-lg border border-gray-100">
                                        <span class="font-bold text-[#503396]" 
                                              th:text="${#temporals.format(schedule.showTime, 'MM월 dd일')} + ' [' + ${schedule.sessionNum} + '회차] '">
                                        </span>
                                        <span class="ml-2 font-medium text-gray-800" 
                                              th:text="${#temporals.format(schedule.startTime, 'HH:mm')} + ' ~ ' + ${#temporals.format(schedule.endTime, 'HH:mm')}">
                                        </span>
                                    </p>
                                </div>
                            </div>
                        </div>
                        
                        <div class="flex items-start gap-3">
                            <i data-lucide="map-pin" class="w-5 h-5 text-[#503396] mt-0.5 flex-shrink-0"></i>
                            <div>
                                <p class="font-medium text-gray-900">장소</p>
                                <p class="text-gray-600 mt-1" 
                                   th:text="${!#lists.isEmpty(content.schedules) and content.schedules[0].place != null ? content.schedules[0].place.name : '장소 미정'}">
                                </p>
                            </div>
                        </div>
                    </div>
                    
                    <div class="bg-gradient-to-br from-[#252451] to-[#503396] rounded-2xl p-6 text-white shadow-lg">
                        <p class="text-sm font-medium text-purple-200 mb-3">티켓 가격 (1인 기준)</p>
                        <div class="space-y-2">
                            <div class="flex justify-between items-center"><span class="font-medium">VIP석</span><span class="text-xl font-bold">150,000원</span></div>
                            <div class="flex justify-between items-center"><span class="font-medium">R석</span><span class="text-xl font-bold">120,000원</span></div>
                            <div class="flex justify-between items-center"><span class="font-medium">S석</span><span class="text-xl font-bold">90,000원</span></div>
                            <div class="flex justify-between items-center"><span class="font-medium">A석</span><span class="text-xl font-bold">60,000원</span></div>
                        </div>
                    </div>
                </div> 
            </div>
        </div>
    </section>

    <section class="max-w-7xl mx-auto px-6 py-8">
        <div class="bg-white rounded-2xl p-8 md:p-10 shadow-sm border border-gray-100">
            <h2 class="text-2xl font-bold text-gray-900 mb-6">작품 소개</h2>
            <div class="prose prose-lg max-w-none text-gray-700 leading-relaxed">
                <p th:text="${content.description}" class="whitespace-pre-line">내용 없음</p>
            </div>
        </div>
    </section>

    <div class="h-32 md:h-24"></div>

    <div class="fixed bottom-0 left-0 right-0 md:bottom-8 md:right-8 md:left-auto z-50">
        
        <div th:if="${content.schedules != null and !#lists.isEmpty(content.schedules)}">
            <div class="md:hidden bg-white border-t border-gray-200 p-4">
                <a th:href="@{/reservation/booking/seat(scheduleId=${content.schedules[0].scheduleId})}"
                   class="block text-center w-full py-4 bg-gradient-to-r from-[#252451] to-[#503396] text-white rounded-xl font-bold text-lg shadow-xl">
                    예매하기 (좌석 선택)
                </a>
            </div>
            <div class="hidden md:block">
                <a th:href="@{/reservation/booking/seat(scheduleId=${content.schedules[0].scheduleId})}"
                   class="inline-block px-12 py-5 bg-gradient-to-r from-[#252451] to-[#503396] text-white rounded-full font-bold text-xl shadow-2xl hover:scale-105 transition-transform duration-200">
                    예매하기 (좌석 선택)
                </a>
            </div>
        </div>

        <div th:if="${content.schedules == null or #lists.isEmpty(content.schedules)}">
             <div class="md:hidden bg-white border-t border-gray-200 p-4">
                <button class="w-full py-4 bg-gray-400 text-white rounded-xl font-bold text-lg cursor-not-allowed" disabled>
                    상영 일정 준비중
                </button>
            </div>
            <div class="hidden md:block">
                <button class="inline-block px-12 py-5 bg-gray-400 text-white rounded-full font-bold text-xl cursor-not-allowed shadow-lg" disabled>
                    상영 일정 준비중
                </button>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
    </script>
    
    <div th:replace="~{layout/footer::footer}"></div>
    
</body>
</html>
