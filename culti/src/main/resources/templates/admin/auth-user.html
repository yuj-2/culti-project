<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/admin_layout}">
<head>
    <title>회원 관리</title>
    <style>
        .custom-thead th {
            background-color: #503396 !important;
            color: white;
        }
    </style>
</head>
<body>
    <div layout:fragment="content" class="container mt-4">

    <h2 class="mb-3">회원 관리</h2>

    <!-- 검색 영역 (UI만) -->
    <div class="card mb-3">
        <div class="card-body">
            <form class="row g-2" method="get" th:action="@{/admin/auth/user}">
                <div class="col-md-4">
                    <input type="text" class="form-control" placeholder="이메일 / 이름 / 닉네임 검색" name="keyword">
                </div>
                <div class="col-md-2">
                    <button class="btn btn-primary">검색</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 스크롤 테이블 -->
    <div class="card">
        <div class="card-body p-0">
            <div style="max-height: 500px; overflow-y: auto;">
                <table class="table table-bordered table-hover align-middle text-center mb-0">
                    <thead class="custom-thead position-sticky top-0">
                        <tr>
                            <th>No</th>
                            <th>Email</th>
                            <th>Name</th>
                            <th>Nickname</th>
                            <th>Phone</th>
                            <th>Gender</th>
                            <th>Birth</th>
                            <th>Role</th>
                            <th>Status</th>
                            <th>Join Date</th>
                            <th>Manage</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="user, stat : ${userList}">
                            <td th:text="${stat.count}">1</td>
                            <td th:text="${user.email}">test@test.com</td>
                            <td th:text="${user.name}">홍길동</td>
                            <td th:text="${user.nickname}">길동이</td>
                            <td th:text="${user.phone}">010-0000-0000</td>

                            <td>
                                <span th:if="${user.gender.toString() == 'M'}">남</span>
                                <span th:if="${user.gender.toString() == 'F'}">여</span>
                            </td>

                            <td th:text="${user.birthDate}">1998-01-01</td>

                            <td>
                                <span class="badge bg-secondary" th:text="${user.role}">USER</span>
                            </td>

                            <td>
                                <span class="badge bg-success"
                                      th:if="${user.status == 'ACTIVE'}">ACTIVE</span>
                                <span class="badge bg-danger"
                                      th:if="${user.status == 'BLOCK'}">BLOCK</span>
                            </td>

                            <td th:text="${#temporals.format(user.createdAt,'yyyy-MM-dd')}">
                                2026-03-04
                            </td>

  <td>

    <!-- USER → ADMIN -->
    <form th:if="${user.role == 'USER'}"
          th:action="@{/admin/user/role/{id}(id=${user.userId})}"
          method="post"
          style="display:inline;">

        <input type="hidden" name="role" value="ADMIN"/>
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <button class="btn btn-sm btn-success">
            ADMIN으로 변경
        </button>
    </form>

    <!-- ADMIN → USER -->
    <form th:if="${user.role == 'ADMIN'}"
          th:action="@{/admin/user/role/{id}(id=${user.userId})}"
          method="post"
          style="display:inline;">

        <input type="hidden" name="role" value="USER"/>
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <button class="btn btn-sm btn-secondary">
            USER로 변경
        </button>
    </form>

</td>
                        </tr>

                        <tr th:if="${#lists.isEmpty(userList)}">
                            <td colspan="11">회원이 없습니다.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</div>
</body>
</html>
