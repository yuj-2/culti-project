<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/admin_layout}">
<head>
    <title>공연 가격 등록</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h4 class="fw-bold m-0"><i class="fas fa-won-sign me-2 text-muted"></i> 공연 좌석 등급별 가격 등록</h4>
        </div>

        <div class="card shadow-sm border-0 mx-auto" style="max-width: 800px;">
            <div class="card-body p-5">
                <form th:action="@{/admin/price/performance}" method="post">
                    <input type="hidden" name="contentId" th:value="${priceDTO.contentId}">
                    
                    <div class="alert alert-light border border-info border-start-0 border-end-0 border-bottom-0 border-top-4 mb-4" role="alert">
                        <i class="fas fa-info-circle text-info me-2"></i> <strong>안내:</strong> 좌석 등급에 맞게 티켓 가격(원)을 숫자만 입력해 주세요.
                    </div>

                    <h5 class="fw-bold mb-4 border-bottom pb-2">가격 정보 입력</h5>

                    <div class="row mb-4 align-items-center">
                        <div class="col-md-3 text-end fw-bold text-danger">VIP석 가격</div>
                        <div class="col-md-8">
                            <div class="input-group shadow-sm">
                                <input type="number" class="form-control" name="vipPrice" 
       								th:value="${priceDTO.vipPrice}" placeholder="예: 150000">
                                <span class="input-group-text bg-white">원</span>
                            </div>
                        </div>
                    </div>

                    <div class="row mb-4 align-items-center">
                        <div class="col-md-3 text-end fw-bold text-primary">R석 가격</div>
                        <div class="col-md-8">
                            <div class="input-group shadow-sm">
                                <input type="number" class="form-control" name="rPrice" 
       								th:value="${priceDTO.rPrice}" placeholder="예: 120000">
                                <span class="input-group-text bg-white">원</span>
                            </div>
                        </div>
                    </div>

                    <div class="row mb-4 align-items-center">
                        <div class="col-md-3 text-end fw-bold text-success">S석 가격</div>
                        <div class="col-md-8">
                            <div class="input-group shadow-sm">
                                <input type="number" class="form-control" name="sPrice" 
      								 th:value="${priceDTO.sPrice}" placeholder="예: 90000">
                                <span class="input-group-text bg-white">원</span>
                            </div>
                        </div>
                    </div>

                    <div class="row mb-5 align-items-center">
                        <div class="col-md-3 text-end fw-bold text-secondary">A석 가격</div>
                        <div class="col-md-8">
                            <div class="input-group shadow-sm">
                                <input type="number" class="form-control" name="aPrice" 
       								th:value="${priceDTO.aPrice}" placeholder="예: 70000">
                                <span class="input-group-text bg-white">원</span>
                            </div>
                        </div>
                    </div>

                    <div class="d-flex justify-content-center gap-2 border-top pt-4">
                        <button type="button" class="btn btn-light border px-4" onclick="history.back()">취소</button>
                        <button type="submit" class="btn btn-culti px-5"><i class="fas fa-check me-2"></i>가격 등록 완료</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
