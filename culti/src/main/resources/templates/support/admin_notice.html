<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>CULTI 관리자 페이지 - 고객센터 - 공지사항 관리</title>
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
	rel="stylesheet">
<link rel="stylesheet"
	href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style>
:root {
	--main-purple: #503396;
}

body {
	background-color: #f4f6f9;
	font-family: 'Pretendard', sans-serif;
}

/* 사이드바 스타일 (기존 유지) */
.sidebar {
	width: 260px;
	height: 100vh;
	position: fixed;
	background: var(--main-purple);
	color: white;
}

.sidebar .nav-link {
	color: rgba(255, 255, 255, 0.7);
	padding: 15px 20px;
	transition: 0.3s;
	text-decoration: none;
	display: block;
}

.sidebar .nav-link:hover, .sidebar .nav-link.active {
	background: rgba(0, 0, 0, 0.1);
	color: white;
}

.main-content {
	margin-left: 260px;
	padding: 30px;
}

.card {
	border-radius: 15px;
	border: none;
	box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
}

.table thead {
	background-color: #f8f9fa;
}

.btn-main {
	background-color: var(--main-purple);
	color: white;
	border-radius: 8px;
}

.btn-main:hover {
	background-color: #3d2675;
	color: white;
}

/* 배지 스타일 */
.badge-view {
	background-color: #e9ecef;
	color: #495057;
	font-weight: 500;
}
</style>
</head>
<body>

	<div class="sidebar">
		<div class="p-4 text-center">
			<h4 class="fw-bold">CULTI ADMIN</h4>
			<p class="small opacity-50">관리자 모드</p>
		</div>
		<nav class="nav flex-column">
			<a class="nav-link" th:href="@{/support/admin/inquiry}"> <i
				class="fas fa-question-circle me-2"></i> 1:1 문의 관리
			</a> <a class="nav-link active" th:href="@{/support/admin/notice}"> <i
				class="fas fa-bullhorn me-2"></i> 공지사항 관리
			</a> <a class="nav-link" th:href="@{/support/admin/faq}"> <i
				class="fas fa-info-circle me-2"></i> FAQ 관리
			</a>
			<hr class="mx-3 opacity-25">
        	<a class="nav-link" th:href="@{/admin/main}"><i class="fas fa-home me-2"></i>관리자 페이지 메인</a>
        	
        	<a class="nav-link text-warning" href="javascript:void(0);" onclick="confirmLogout()">
    			<i class="fas fa-sign-out-alt me-2"></i>관리자 계정 로그아웃
			</a>
		</nav>
	</div>

	<div class="main-content">
		<div class="d-flex justify-content-between align-items-center mb-4">
			<h3 class="fw-bold">
				<i class="fas fa-bullhorn me-2"></i>공지사항 관리
			</h3>
			<a th:href="@{/support/admin/notice/write}" class="btn btn-main px-4">
				<i class="fas fa-plus me-2"></i>새 공지 등록
			</a>
		</div>

		<div class="card p-4">
			<table class="table table-hover align-middle">
				<thead>
					<tr>
						<th style="width: 80px;">번호</th>
						<th>제목</th>
						<th style="width: 120px;">조회수</th>
						<th style="width: 150px;">관리</th>
					</tr>
				</thead>
				<tbody>
					<tr th:each="notice : ${noticePage.content}">
						<td th:text="${notice.noticeId}">1</td>
						<td>
							<div class="fw-bold" th:text="${notice.noticeTitle}">공지사항
								제목입니다.</div>
							<div class="small text-muted"
								th:text="${#strings.abbreviate(notice.noticeContent, 50)}">내용
								미리보기...</div>
						</td>
						<td><span class="badge badge-view"
							th:text="${notice.viewCount}">0</span></td>
						<td><a
							th:href="@{/support/admin/notice/delete/{id}(id=${notice.noticeId})}"
							class="btn btn-sm btn-outline-danger"
							onclick="return confirm('정말로 이 공지사항을 삭제하시겠습니까?');"> <i
								class="fas fa-trash-alt me-1"></i> 삭제
						</a></td>
					</tr>
					<tr th:if="${noticePage.totalElements == 0}">
						<td colspan="4" class="text-center py-5 text-muted">등록된 공지사항이
							없습니다.</td>
					</tr>
				</tbody>
			</table>

			<nav aria-label="Page navigation" class="mt-4"
				th:if="${noticePage.totalPages > 1}">
				<ul class="pagination justify-content-center">
					<li class="page-item"
						th:classappend="${!noticePage.hasPrevious} ? 'disabled'"><a
						class="page-link"
						th:href="@{/support/admin/notice(page=${noticePage.number - 1})}">이전</a>
					</li>
					<li class="page-item disabled"><span class="page-link"
						th:text="${noticePage.number + 1} + ' / ' + ${noticePage.totalPages}"></span>
					</li>
					<li class="page-item"
						th:classappend="${!noticePage.hasNext} ? 'disabled'"><a
						class="page-link"
						th:href="@{/support/admin/notice(page=${noticePage.number + 1})}">다음</a>
					</li>
				</ul>
			</nav>
		</div>
	</div>

	<script
		src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
function confirmLogout() {
    if (confirm("정말로 로그아웃 하시겠습니까?")) {
        // 우리가 새로 만든 LogoutController의 @GetMapping("/admin/logout")을 호출합니다.
        location.href = "/admin/logout";
    }
}
</script>
</body>
</html>
