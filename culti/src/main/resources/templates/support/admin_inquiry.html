<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>CULTI 관리자 페이지 - 고객센터 - 문의</title>
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
	rel="stylesheet">
<link rel="stylesheet"
	href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style>
:root {
	--main-purple: #503396;
}

body {
	background-color: #f4f6f9;
	font-family: 'Pretendard', sans-serif;
}

/* 사이드바 스타일 (기존 유지) */
.sidebar {
	width: 260px;
	height: 100vh;
	position: fixed;
	background: var(--main-purple);
	color: white;
}

.sidebar .nav-link {
	color: rgba(255, 255, 255, 0.7);
	padding: 15px 20px;
	transition: 0.3s;
	text-decoration: none;
	display: block;
}

.sidebar .nav-link:hover, .sidebar .nav-link.active {
	background: rgba(0, 0, 0, 0.1);
	color: white;
}

.main-content {
	margin-left: 260px;
	padding: 30px;
}

.card {
	border-radius: 15px;
	border: none;
	box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
}

.table thead {
	background-color: #f8f9fa;
}

.btn-main {
	background-color: var(--main-purple);
	color: white;
	border-radius: 8px;
}

.btn-main:hover {
	background-color: #3d2675;
	color: white;
}

/* 배지 스타일 */
.badge-view {
	background-color: #e9ecef;
	color: #495057;
	font-weight: 500;
}
</style>
</head>
<body>

	<div class="sidebar">
		<div class="p-4 text-center">
			<h4 class="fw-bold">CULTI ADMIN</h4>
			<p class="small opacity-50">관리자 모드</p>
		</div>
		<nav class="nav flex-column">
			<a class="nav-link active" th:href="@{/support/admin/inquiry}"> <i
				class="fas fa-question-circle me-2"></i> 1:1 문의 관리
			</a> <a class="nav-link" th:href="@{/support/admin/notice}"> <i
				class="fas fa-bullhorn me-2"></i> 공지사항 관리
			</a> <a class="nav-link" th:href="@{/support/admin/faq}"> <i
				class="fas fa-info-circle me-2"></i> FAQ 관리
			</a>
		</nav>
	</div>

	<div class="main-content">
		<div class="card p-4">
			<h3 class="mb-4">1:1 문의 답변 관리</h3>
			<table class="table table-hover">
				<thead class="table-light">
					<tr>
						<th>번호</th>
						<th>작성자ID</th>
						<th>제목</th>
						<th>상태</th>
						<th>관리</th>
					</tr>
				</thead>
				<tbody>
					<tr th:each="inquiry : ${inquiries}">
						<td th:text="${inquiry.inquiryId}">1</td>
						<td th:text="${inquiry.userId}">user01</td>
						<td th:text="${inquiry.inquiryTitle}">문의 제목</td>
						<td><span
							th:class="${inquiry.inquiryStatus.name() == 'PENDING' ? 'badge bg-warning' : 'badge bg-success'}"
							th:text="${inquiry.inquiryStatus.name() == 'PENDING' ? '대기' : '완료'}"></span>
						</td>
						<td>
							<button class="btn btn-sm btn-outline-primary"
								data-bs-toggle="modal"
								th:data-bs-target="'#replyModal'+${inquiry.inquiryId}">답변하기</button>
						</td>
					</tr>
				</tbody>
			</table>
		</div>
	</div>

	<div th:each="inquiry : ${inquiries}" class="modal fade"
		th:id="'replyModal'+${inquiry.inquiryId}" tabindex="-1">
		<div class="modal-dialog">
			<form th:action="@{/support/admin/inquiry/reply}" method="post"
				class="modal-content">
				<input type="hidden" name="inquiryId"
					th:value="${inquiry.inquiryId}">
				<div class="modal-header">
					<h5 class="modal-title">문의 답변</h5>
				</div>
				<div class="modal-body">
					<p>
						<strong>질문:</strong> <span th:text="${inquiry.inquiryContent}"></span>
					</p>
					<textarea name="answer" class="form-control" rows="5"
						placeholder="답변을 입력하세요" required></textarea>
				</div>
				<div class="modal-footer">
					<button type="submit" class="btn btn-primary"
						style="background-color: var(--main-purple);">저장</button>
				</div>
			</form>
		</div>
	</div>

	<script
		src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
