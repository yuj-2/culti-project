<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>CULTI 관리자 페이지 - 고객센터 - FAQ 등록</title>
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
	rel="stylesheet">
<link rel="stylesheet"
	href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style>
:root {
	--main-purple: #503396;
}

body {
	background-color: #f4f6f9;
	font-family: 'Pretendard', sans-serif;
}

/* 사이드바 스타일 유지 */
.sidebar {
	width: 260px;
	height: 100vh;
	position: fixed;
	background: var(--main-purple);
	color: white;
}

.sidebar .nav-link {
	color: rgba(255, 255, 255, 0.7);
	padding: 15px 20px;
	transition: 0.3s;
	text-decoration: none;
	display: block;
}

.sidebar .nav-link:hover, .sidebar .nav-link.active {
	background: rgba(0, 0, 0, 0.1);
	color: white;
}

.main-content {
	margin-left: 260px;
	padding: 30px;
}

.card {
	border-radius: 15px;
	border: none;
	box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
}

.form-label {
	font-weight: 600;
	color: #444;
}

.form-control:focus, .form-select:focus {
	border-color: var(--main-purple);
	box-shadow: 0 0 0 0.25rem rgba(80, 51, 150, 0.1);
}

.btn-main {
	background-color: var(--main-purple);
	color: white;
	border-radius: 8px;
	padding: 10px 25px;
}

.btn-main:hover {
	background-color: #3d2675;
	color: white;
}

.btn-cancel {
	border-radius: 8px;
	padding: 10px 25px;
}
</style>
</head>
<body>

	<div class="sidebar">
		<div class="p-4 text-center">
			<h4 class="fw-bold">CULTI ADMIN</h4>
			<p class="small opacity-50">관리자 모드</p>
		</div>
		<nav class="nav flex-column">
			<a class="nav-link" th:href="@{/support/admin/inquiry}"> <i
				class="fas fa-question-circle me-2"></i> 1:1 문의 관리
			</a> <a class="nav-link" th:href="@{/support/admin/notice}"> <i
				class="fas fa-bullhorn me-2"></i> 공지사항 관리
			</a> <a class="nav-link active" th:href="@{/support/admin/faq}"> <i
				class="fas fa-info-circle me-2"></i> FAQ 관리
			</a>
			<hr class="mx-3 opacity-25">
        	<a class="nav-link" th:href="@{/admin/main}"><i class="fas fa-home me-2"></i>관리자 페이지 메인</a>
        	<a class="nav-link text-warning" href="javascript:void(0);" onclick="confirmLogout()">
    			<i class="fas fa-sign-out-alt me-2"></i>관리자 계정 로그아웃
			</a>
		</nav>
	</div>

	<div class="main-content">
		<div class="mb-4">
			<h3 class="fw-bold">
				<i class="fas fa-plus-circle me-2"></i>새 FAQ 등록
			</h3>
			<p class="text-muted">사용자들이 자주 묻는 질문과 답변을 카테고리별로 등록합니다.</p>
		</div>

		<div class="card p-5">
			<form th:action="@{/support/admin/faq/save}" method="post">

				<div class="mb-4">
					<label for="category" class="form-label">카테고리</label> <select
						class="form-select form-select-lg" id="category" name="category"
						required>
						<option value="" disabled selected>카테고리를 선택하세요</option>
						<option th:each="cat : ${categories}" th:value="${cat}"
							th:text="${cat}"></option>
					</select>
				</div>

				<div class="mb-4">
					<label for="content" class="form-label">질문 (Content)</label> <input
						type="text" class="form-control form-control-lg" id="content"
						name="content" placeholder="질문 내용을 입력하세요" required>
				</div>

				<div class="mb-4">
					<label for="answer" class="form-label">답변 (Answer)</label>
					<textarea class="form-control" id="answer" name="answer" rows="8"
						placeholder="상세 답변을 입력하세요" required></textarea>
				</div>

				<div class="d-flex justify-content-end gap-2 mt-4">
					<a th:href="@{/support/admin/faq}"
						class="btn btn-outline-secondary btn-cancel">취소</a>
					<button type="submit" class="btn btn-main fw-bold">
						<i class="fas fa-save me-2"></i>FAQ 저장하기
					</button>
				</div>

			</form>
		</div>
	</div>

	<script
		src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
function confirmLogout() {
    if (confirm("정말로 로그아웃 하시겠습니까?")) {
        // 우리가 새로 만든 LogoutController의 @GetMapping("/admin/logout")을 호출합니다.
        location.href = "/admin/logout";
    }
}
</script>
</body>
</html>
